name: Lint components

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "pyyaml>=6.0"

      - name: Lint component frontmatter and structure
        run: python3 .github/scripts/lint_components.py
