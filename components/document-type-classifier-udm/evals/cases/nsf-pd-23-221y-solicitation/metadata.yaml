notes: |
  Baseline "easy" solicitation case. The document is headed with the literal
  phrase "Program Solicitation" followed by an NSF announcement number and a
  program title, which is the highest-signal indicator the classifier looks
  for. Confidence belongs in the 0.9+ band and secondary_candidates must be
  empty.

  Input is a short, synthetic reconstruction of the canonical NSF
  solicitation first-page layout (Program Solicitation header, Important
  Information box with due dates, Synopsis paragraph). It does not copy any
  specific public solicitation verbatim, but it mirrors the structure of
  NSF's PAPPG-standard opening.
