notes: |
  First case for this component. Representative of the most common NSF
  Award Notice shape: a Standard Grant initial obligation to a single
  prime institution, where collaboration with a second institution is
  expressed via a Co-PI on a subaward rather than separate awards. The
  notice does not itemize the subrecipient's allocation; the aggregate
  Subawards line in budget category G totals $1,142,772 but individual
  subawardees are not broken out. expected.json exercises the schema's
  subaward inference rule on this pattern.
