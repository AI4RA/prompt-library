notes: |
  Mixed case. The solicitation:
    1. Modifies proposal_narrative (NIH 'Research Strategy') from 12
       pages to 6 pages, explaining that the RFA targets exploratory
       work suited to a shorter narrative.
    2. Adds a net-new 'Milestones and Timeline' supplement not present
       in the NIH R01 defaults.

  The sponsor-defaults prior uses the NIH R01 defaults (a subset of the
  sponsor-doc-defaults-udm nih-r01 case). The solicitation_notes field
  should call out that the RFA frames its narrative limit explicitly as
  a modification.

  Ordering: the modification appears first in document_requirements,
  the net-new supplement appears second.
