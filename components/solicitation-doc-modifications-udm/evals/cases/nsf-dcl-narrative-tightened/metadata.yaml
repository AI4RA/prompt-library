notes: |
  Modify-only case. The solicitation tightens the NSF Project
  Description from 15 pages to 10 pages, and expands the Data
  Management Plan from 2 pages to 3 pages with a new required
  subheading ("Sample and Specimen Sharing"). No net-new documents.

  The sponsor-defaults prior is the NSF full-proposal defaults
  (reusing the shape from sponsor-doc-defaults-udm's nsf-full-proposal
  case). Only proposal_narrative and data_mgmt should appear in
  the output; every other default passes through unchanged.

  Each emitted entry carries the full field set — including fields
  the solicitation does not touch (e.g., is_required, is_per_person,
  conditional_on echo the default) — so that a downstream merge can
  replace the default wholesale.
