notes: |
  Net-new-only case. The solicitation introduces two documents that
  are not in the NSF defaults: a Strategic Plan and a Knowledge
  Transfer Plan. Neither corresponds to an existing default code;
  both are emitted with code 'other' and distinctive labels, with
  modifies_default: null.

  The solicitation does not alter any PAPPG default document. The
  expected output therefore contains exactly two entries, both
  net-new.

  This case exercises:
    - the 'other'-code fallback with a descriptive label
    - net-new entries carrying page_limit and format_spec
    - the ordering rule (net-new documents listed in the order the
      solicitation introduces them)
