notes: |
  First case for the vandalizer-to-udm-translation component. Exercises the
  core mapping table against a real Vandalizer extraction of an NSF Standard
  Grant Amendment 000 notice (MRI: Track 1, FAIN 2511003, August 2025) with
  all Co-PIs at the same institution as the PI. Negative test for subaward
  inference: G.Subawards = 0 AND no Co-PI at a non-recipient institution, so
  subawards is []. All three sponsor-contact blocks and the three terms-and-
  conditions source fields come through as "N/A", producing empty arrays.
  Indirect cost base cannot be determined because the Vandalizer input has
  "Modified Total Direct Costs" = "N/A" — indirect_cost_base emits null even
  though the rate is 50%. The yellow-highlight review field is "N/A", so
  source_provenance.review_annotations is [].
