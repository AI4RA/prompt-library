# Authored source for the NSF Budget Justification (Multi-step) Vandalizer
# workflow. The sibling nsf-budget-justification-multistep.vandalizer.json
# is generated by scripts/build_vandalizer_workflows.py. Do not hand-edit
# the generated JSON.
#
# This is the first multi-component orchestration in the repo. It lives
# under the top-level workflows/ directory (not under a single component's
# workflows/ subdirectory) because it pins three separate components.

name: NSF Budget Justification (Multi-step)
description: >
  Three-step NSF budget-justification pipeline. Step 1 normalizes an
  NSF-style proposal budget workbook into a structured budget object.
  Step 2 drafts the eight NSF budget-justification sections (A–H) from
  that structured budget. Step 3 reviews and polishes the drafted array
  for section-placement errors, missing disclosures, fabricated figures,
  and NSF-framing consistency. The final output validates against
  components/nsf-budget-justification-udm/schema.json at #/$defs/output.

workflow_version: 1.0.0
vandalizer_schema_version: 2
status: experimental
owner: ai4ra-prompt-library
created: 2026-04-24
updated: 2026-04-24

components:
  - slug: nsf-budget-spreadsheet-ingest-udm
    pinned_version: 1.0.0
  - slug: nsf-budget-justification-udm
    pinned_version: 1.0.0
  - slug: nsf-budget-justification-review-udm
    pinned_version: 1.0.0

steps:
  - name: Ingest workbook into structured budget
    tasks:
      - name: nsf-budget-spreadsheet-ingest-udm
        input_source: step_input
        prompt_ref:
          component: nsf-budget-spreadsheet-ingest-udm
          from_section: "## Prompt"

  - name: Draft eight-section NSF budget justification
    tasks:
      - name: nsf-budget-justification-udm
        input_source: step_input
        prompt_ref:
          component: nsf-budget-justification-udm
          from_section: "## Prompt"

  - name: Review and polish the drafted array
    is_output: true
    tasks:
      - name: nsf-budget-justification-review-udm
        input_source: step_input
        prompt_ref:
          component: nsf-budget-justification-review-udm
          from_section: "## Prompt"

evals:
  workflow_local: true
